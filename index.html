<html lang="en" id="htmlRoot">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.6;
    }

    /* ---- HERO ---- */
    .hero {
      background: #1c004c;
      color: #ffffff;
      padding: 3.5rem 2rem 3rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 0.75rem;
    }

    .hero .subheader {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      opacity: 0.75;
      max-width: 520px;
      margin: 0 auto 2rem;
      line-height: 1.5;
    }

    .hero .powered-by {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8125rem;

    /* ---- TOOLBAR ---- */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #eee;
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #2d1560;
      color: #fff;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 9999px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;

    }

    .submit-btn:hover { background: #3d1f80; transform: translateY(-1px); }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;

    }

    .filter-group {
      display: flex;
      align-items: center;

    }

    .filter-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.5625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9b8fb5;
      margin-right: 0.125rem;
    }

    .filter-btn {
      font-family: 'Montserrat', sans-serif;
      background: #f7f5fa;
      border: 1px solid #e8e4f0;
      padding: 0.3rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.625rem;
      font-weight: 600;
      cursor: pointer;
      color: #6b5b8a;

      letter-spacing: 0.02em;
    }

    .filter-btn:hover { border-color: #2d1560; color: #2d1560; background: #f0ebf8; }
    .filter-btn:focus { outline: none; }
    .filter-btn.active { background: #2d1560; color: #fff; border-color: #2d1560; }

    .clear-filters-btn {
      font-family: 'Montserrat', sans-serif;
      background: none;
      border: none;
      padding: 0.3rem 0.5rem;
      font-size: 0.625rem;
      font-weight: 600;
      cursor: pointer;
      color: #9b8fb5;
      transition: color 0.15s;
      display: none;
    }
    .clear-filters-btn:hover { color: #2d1560; }
    .clear-filters-btn:focus { outline: none; }

    .filter-sep {
      width: 1px;
      height: 20px;
      background: #e8e4f0;
      margin: 0 0.25rem;
    }

    /* ---- EVENTS ---- */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .section-label {

      font-size: 0.75rem;

    .date-badge {
      flex-shrink: 0;

      height: 54px;

      border-radius: 10px;

    .date-badge .month {

    .event-info { flex: 1; min-width: 0; }

    .event-meta {

      background: #f0ebf8;

      font-weight: 700;
      padding: 0.1rem 0.45rem;

      padding: 0.1rem 0.45rem;

      letter-spacing: 0.03em;

      color: #1565c0;

    .event-tags {

    .tag {

    /* ---- PAST EVENTS ---- */

      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      background: none;
      border: none;

      font-weight: 700;

      letter-spacing: 0.08em;

    .past-events { display: none; }

    .past-events .event-card { opacity: 0.35; }
    .past-events .event-card:hover { opacity: 0.65; }

    /* ---- EMPTY STATE ---- */

    /* ---- LANG TOGGLE ---- */

    .lang-toggle button:hover:not(.active) {

    /* ---- BADGE PILLS ---- */
    .badge-recommended {

      align-items: center;
      gap: 0.2rem;
      background: #ede7f6;
      color: #4527a0;
      font-size: 0.5625rem;

      align-items: center;

      font-size: 0.5625rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;

    /* ---- FOUNDERS CALL CARD ---- */

    .founders-call-title {

      font-size: 0.9375rem;

      color: #1a1a1a;
      margin-bottom: 0.2rem;
    }

    .founders-call-desc {
      font-size: 0.775rem;
      color: #777;
      line-height: 1.5;
    }

    .founders-call-cta {

      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #2d1560;
      color: #fff;
      text-decoration: none;
      padding: 0.55rem 1.1rem;
      border-radius: 9999px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .founders-call-cta:hover { background: #3d1f80; transform: translateY(-1px); }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 640px) {
      .lang-toggle { top: 0.75rem; right: 0.75rem; }
      .hero { padding: 2.5rem 1.25rem 2rem; }
      .hero h1 { font-size: 1.75rem; }
      .hero .subheader { font-size: 0.9rem; }
      .toolbar { flex-direction: column; align-items: stretch; padding: 1rem 1.25rem; }
      .submit-btn { justify-content: center; }
      .filter-bar { gap: 0.5rem; }
      .filter-sep { display: none; }
      .container { padding: 0 1.25rem 3rem; }
      .date-badge { width: 46px; height: 46px; }
      .date-badge .day { font-size: 1.125rem; }
      .event-name { font-size: 0.9375rem; }
      .founders-call { flex-direction: column; gap: 0.875rem; align-items: flex-start; }
      .founders-call-cta { width: 100%; justify-content: center; }
    }
  </style>
</head>

<script>
const I18N = {
  en: {
    title: "What's up, Polish<br>tech community",
    subtitle: "Live directory of tech / start-up / science events and meetups in Poland",
    poweredBy: "Powered by",
    curatedBy: "Curated by",
    submitBtn: "+ Submit an Event",
    clearAll: "Clear all",
    upcoming: "Upcoming",
    pastEvents: "Past Events",
    emptyUpcoming: 'No upcoming events matching filters. <a href="https://tally.so/r/dWA9do" target="_blank">Submit one!</a>',
    emptyLoad: "Could not load events.",
    months: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    filterLabels: { city: 'City', type: 'Type', language: 'Language', audience: 'Audience', price: 'Price', badge: 'Curated' },
    foundersCallTitle: 'Weekly Founders Call',
    foundersCallDesc: 'Open weekly session for startup founders — peer exchange, deal flow, and Q&A. Max 25 seats, waitlist available.',
    foundersCallCta: 'Sign up on Luma →'
  },
  pl: {
    title: "Co słychać w polskim<br>tech community",
    subtitle: "Katalog wydarzeń technologicznych, startupowych i naukowych w Polsce",
    poweredBy: "Przy wsparciu",
    curatedBy: "Prowadzony przez",
    submitBtn: "+ Zgłoś wydarzenie",
    clearAll: "Wyczyść",
    upcoming: "Nadchodzące",
    pastEvents: "Minione wydarzenia",
    emptyUpcoming: 'Brak nadchodzących wydarzeń pasujących do filtrów. <a href="https://tally.so/r/dWA9do" target="_blank">Zgłoś swoje!</a>',
    emptyLoad: "Nie udało się załadować wydarzeń.",
    months: ['Sty','Lut','Mar','Kwi','Maj','Cze','Lip','Sie','Wrz','Paź','Lis','Gru'],
    filterLabels: { city: 'Miasto', type: 'Typ', language: 'Język', audience: 'Odbiorcy', price: 'Cena', badge: 'Polecane' },
    foundersCallTitle: 'Tygodniowe spotkanie założycieli',
    foundersCallDesc: 'Otwarte tygodniowe spotkanie dla założycieli startupów — wymiana doświadczeń, deal flow, Q&A. Max 25 miejsc, lista oczekujących dostępna.',
    foundersCallCta: 'Zapisz się na Luma →',
    values: {
      'Meetup': 'Meetup', 'Conference': 'Konferencja', 'Hackathon': 'Hackathon',
      'Workshop': 'Warsztaty', 'Networking': 'Networking', 'Policy': 'Polityka',
      'Founders': 'Założyciele', 'Developers': 'Programiści', 'Operators': 'Operatorzy',
      'Researchers': 'Naukowcy', 'Investors': 'Inwestorzy', 'Corporate': 'Korporacje',
      'Students': 'Studenci', 'General public': 'Publiczność',
      'Free': 'Bezpłatne', 'Paid': 'Płatne',
      'recommended': '★ Polecane', 'partner': 'Partner'
    }
  }
};

let currentLang = localStorage.getItem('events-lang') || 'en';

function t(key) { return I18N[currentLang][key]; }
function tv(val) { return (I18N[currentLang].values && I18N[currentLang].values[val]) || val; }

const FILTER_DEFS = [
  { key: 'city',     label: 'City',      options: null, match: (ev, v) => ev.city === v },
  { key: 'type',     label: 'Type',      options: ['Meetup','Conference','Hackathon','Workshop','Networking','Policy'], match: (ev, v) => (ev.tags || []).includes(v) },
  { key: 'language', label: 'Language',   options: ['EN','PL','EN+PL'], match: (ev, v) => ev.language === v },
  { key: 'audience', label: 'Audience',   options: ['Founders','Developers','Operators','Researchers','Investors','Corporate','Students','General public'], match: (ev, v) => (ev.audience || '').includes(v) },
  { key: 'price',    label: 'Price',      options: ['Free','Paid'], match: (ev, v) => ev.price === v },
  { key: 'badge',    label: 'Curated',    options: ['recommended','partner'], match: (ev, v) => ev.badge === v }
];

let allEvents = [];
let activeFilters = Object.fromEntries(FILTER_DEFS.map(d => [d.key, new Set()]));

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function applyFilters(events) {
  return events.filter(ev => {
    return FILTER_DEFS.every(def => {
      const vals = activeFilters[def.key];
      if (vals.size === 0) return true;
      return [...vals].some(v => def.match(ev, v));
    });
  });
}

function hasActiveFilters() {
  return FILTER_DEFS.some(def => activeFilters[def.key].size > 0);
}

function renderCard(ev) {
  const d = parseDate(ev.date);
  const month = I18N[currentLang].months[d.getMonth()];
  const day = d.getDate();

  const tags = (ev.tags || []).map(tag => `<span class="tag">${tv(tag)}</span>`).join('');
  const time = ev.time || '';
  const desc = (currentLang === 'pl' && ev.description_pl) ? ev.description_pl : ev.description;
  const price = ev.price ? tv(ev.price) : '';
  const audience = ev.audience
    ? ev.audience.split(', ').map(a => tv(a)).join(', ')
    : '';
  const badgeHtml = ev.badge === 'recommended'
    ? `<span class="badge-recommended">★ ${currentLang === 'pl' ? 'Polecane' : 'Recommended'}</span>`
    : ev.badge === 'partner'
    ? `<span class="badge-partner">🤝 ${ev.partner_name || 'Partner'}</span>`
    : '';

  return `
    <div class="event-card">
      <div class="date-badge">
        <div class="month">${month}</div>
        <div class="day">${day}</div>
      </div>
      <div class="event-info">
        <a class="event-name" href="${ev.url}" target="_blank" rel="noopener">${ev.name}</a>${badgeHtml}
        <div class="event-meta">
          ${ev.city ? `<span class="city-pill">${ev.city}</span>` : ''}
          ${ev.venue ? `<span>${ev.venue}</span>` : ''}
          ${time ? `<span class="sep">&middot;</span><span>${time}</span>` : ''}
          <span class="sep">&middot;</span>
          <span class="lang-pill">${ev.language}</span>
          ${price ? `<span class="sep">&middot;</span><span class="price-pill ${ev.price.toLowerCase() === 'free' ? 'free' : 'paid'}">${price}</span>` : ''}
          ${audience ? `<span class="sep">&middot;</span><span>${audience}</span>` : ''}
        </div>
        <div class="event-tags">${tags}</div>
        ${desc ? `<div class="event-desc">${desc}</div>` : ''}
      </div>
    </div>
  `;
}

function render() {
  const now = today();
  const filtered = applyFilters(allEvents);

  const upcoming = filtered.filter(e => e.date >= now).sort((a, b) => a.date.localeCompare(b.date));
  const past = filtered.filter(e => e.date < now).sort((a, b) => b.date.localeCompare(a.date));

  const upEl = document.getElementById('upcoming');
  const pastEl = document.getElementById('past');
  const pastToggle = document.getElementById('pastToggle');
  const upLabel = document.getElementById('upcomingLabel');

  if (upcoming.length) {
    upLabel.style.display = '';
    upEl.innerHTML = upcoming.map(renderCard).join('');
  } else {
    upLabel.style.display = 'none';
    upEl.innerHTML = `<div class="empty-state">${t('emptyUpcoming')}</div>`;
  }

  if (past.length) {
    pastToggle.style.display = '';
    pastEl.innerHTML = past.map(renderCard).join('');
  } else {
    pastToggle.style.display = 'none';
    pastEl.innerHTML = '';
  }
}

function buildFilters() {
  const bar = document.getElementById('filterBar');

  FILTER_DEFS.forEach((def, i) => {
    const usedValues = new Set();
    allEvents.forEach(ev => {
      if (def.key === 'type') (ev.tags || []).forEach(tag => usedValues.add(tag));
      else if (def.key === 'audience') (ev.audience || '').split(', ').forEach(a => { if (a) usedValues.add(a); });
      else if (ev[def.key]) usedValues.add(ev[def.key]);
    });

    const available = def.options
      ? def.options.filter(o => usedValues.has(o))
      : [...usedValues].sort((a, b) => a.localeCompare(b, 'pl'));
    if (!available.length) return;

    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'filter-sep';
      bar.appendChild(sep);
    }

    const group = document.createElement('div');
    group.className = 'filter-group';

    const label = document.createElement('span');
    label.className = 'filter-label';
    label.textContent = I18N[currentLang].filterLabels[def.key] || def.label;
    label.dataset.filterLabelKey = def.key;
    group.appendChild(label);

    available.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = tv(opt);
      btn.dataset.filterKey = def.key;
      btn.dataset.filterVal = opt;
      btn.onclick = () => {
        const s = activeFilters[def.key];
        if (s.has(opt)) s.delete(opt); else s.add(opt);
        btn.blur();
        updateFilterUI();
        render();
      };
      group.appendChild(btn);
    });

    bar.appendChild(group);
  });
}

function updateFilterUI() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const key = btn.dataset.filterKey;
    const val = btn.dataset.filterVal;
    const isActive = activeFilters[key].has(val);
    if (isActive) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  const clearBtn = document.getElementById('clearFilters');
  clearBtn.style.display = hasActiveFilters() ? '' : 'none';
}

document.getElementById('clearFilters').addEventListener('click', function() {
  FILTER_DEFS.forEach(def => activeFilters[def.key].clear());
  this.blur();
  updateFilterUI();
  render();
});

document.getElementById('pastToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('past').classList.toggle('open');
});

fetch('events.json')
  .then(r => r.json())
  .then(data => {
    allEvents = data.filter(ev => !ev.status || ev.status === 'approved');
    buildFilters();
    render();
  })
  .catch(() => {
    document.getElementById('upcoming').innerHTML = `<div class="empty-state">${t('emptyLoad')}</div>`;
  });

/* ---- LANGUAGE TOGGLE ---- */
function applyI18n() {
  document.getElementById('htmlRoot').lang = currentLang;
  document.title = currentLang === 'pl'
    ? "Co słychać w polskim tech community"
    : "What's Up, Polish Tech Community";
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[currentLang][key]) el.innerHTML = I18N[currentLang][key];
  });
  document.querySelectorAll('[data-filter-label-key]').forEach(el => {
    const key = el.dataset.filterLabelKey;
    el.textContent = I18N[currentLang].filterLabels[key] || key;
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.textContent = tv(btn.dataset.filterVal);
  });
  document.querySelectorAll('#langToggle button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
}

document.getElementById('langToggle').addEventListener('click', function(e) {
  const btn = e.target.closest('button[data-lang]');
  if (!btn || btn.dataset.lang === currentLang) return;
  currentLang = btn.dataset.lang;
  localStorage.setItem('events-lang', currentLang);
  applyI18n();
  render();
});

// Apply saved language on load
applyI18n();
</script>
